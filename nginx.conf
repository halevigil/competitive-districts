# Minimal nginx site config for the static simulator.  Listens on 8080 (the
# internal port Fly.io routes to via fly.toml [http_service]) and serves
# everything out of /usr/share/nginx/html.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # All explicit assets we ship — html, js, csv.  Everything else 404s
    # rather than falling back to index.html (no SPA routing here).
    location / {
        try_files $uri $uri/ =404;
    }

    # CSV data files are fetched by historical.html via fetch().  Make sure
    # they're served as text/csv so browsers don't try to interpret them
    # as HTML when the URL is opened directly.
    location ~* \.csv$ {
        types { } default_type text/csv;
    }

    gzip on;
    gzip_types text/plain text/csv text/javascript application/javascript text/html;
    gzip_min_length 1024;
}
